<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cliente Calculadora Web</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Cliente calculadora web</h1>
        <button id="btn-historial">Historial</button>
    </header>

    <div id="overlay"></div>

    <aside id="sidebar">
        <ul id="lista-historial"></ul>
        <button id="btn-vaciar-historial">Eliminar historial</button>
    </aside>

    <main>
        <div class="fila-superior">
            <input type="text" class="input-numero" placeholder="0">
            <select id="operador">
                <option value="+">+</option>
                <option value="-">-</option>
                <option value="*">×</option>
                <option value="/">÷</option>
            </select>
            <input type="text" class="input-numero" placeholder="0">
            <button id="btn-igual">=</button>
            <input type="text" readonly placeholder="Resultado">
        </div>

            <div id="mensaje-error">Solo se pueden ingresar números</div>
    </main>

    <!-- Modal para editar registros -->
    <div id="modal-editar" class="modal" style="display: none;">
        <div class="modal-contenido">
            <span class="cerrar-modal">&times;</span>
            <h2>Editar Registro</h2>
            <div class="form-editar">
                <div>
                    <label>Valor A:</label>
                    <input type="number" id="edit-a" placeholder="0">
                </div>
                <div>
                    <label>Operación:</label>
                    <select id="edit-operacion">
                        <option value="sumar">+</option>
                        <option value="restar">-</option>
                        <option value="multiplicar">×</option>
                        <option value="dividir">÷</option>
                    </select>
                </div>
                <div>
                    <label>Valor B:</label>
                    <input type="number" id="edit-b" placeholder="0">
                </div>
                <div>
                    <label>Resultado:</label>
                    <input type="number" id="edit-resultado" placeholder="0">
                </div>
                <div class="botones-modal">
                    <button id="btn-guardar-put">Guardar (PUT)</button>
                    <button id="btn-guardar-patch">Actualizar Parcial (PATCH)</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
